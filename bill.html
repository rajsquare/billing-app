<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <title>Billing App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- APP TABS -->
  <div class="app-tabs">
    <button
      id="billingTab"
      class="tab-btn active"
    >
      Billing
    </button>

    <button
      id="receiverTab"
      class="tab-btn"
    >
      Receiver
    </button>
  </div>

  <!-- BILLING VIEW -->
  <div id="billingView">

    <div class="search-container">

      <div class="header-row">
        <h1>Billing App</h1>

        <button id="modeToggle">
          W
        </button>
      </div>

      <div class="search-wrapper">

        <input
          type="text"
          id="searchBox"
          placeholder="Search product..."
          autocomplete="off"
        >

        <div id="clearSearch">
          <span class="clear-x">✕</span>
        </div>

      </div>

      <div id="suggestions"></div>

    </div>

    <div id="billItems"></div>

    <div class="total-card">

      <div class="total-row">
        <span>Total</span>
        <span id="grandTotal">₹0</span>
      </div>

      <div class="action-buttons">
        <button id="printBtn">
          Print
        </button>

        <button id="sendBtn">
          Send
        </button>
      </div>

    </div>

  </div>

  <!-- RECEIVER VIEW -->
  <div id="receiverView">

    <div class="receiver-card">
      <div class="receiver-title">
        Receiver Mode
      </div>

      <div class="receiver-subtitle">
        Waiting for incoming bills...
      </div>

      <div id="incomingBills"></div>
    </div>

  </div>

  <!-- MODAL -->
  <div id="printModal" class="modal-overlay">

    <div class="modal-card">

      <div
        class="modal-title"
        id="modalTitle"
      >
        Bill Details
      </div>

      <div class="modal-group">
        <label>Date</label>
        <input
          type="date"
          id="printDate"
        >
      </div>

      <div
        class="modal-group"
        id="customerGroup"
      >
        <label>Customer Name</label>
        <input
          type="text"
          id="customerName"
          placeholder="Enter customer name"
        >
      </div>

      <div class="modal-group">
        <label>Serial Number</label>
        <input
          type="text"
          id="serialNumber"
          placeholder="Enter serial number"
        >
      </div>

      <div class="modal-actions">

        <button
          id="cancelPrint"
          class="secondary-btn"
        >
          Cancel
        </button>

        <button
          id="confirmPrint"
          class="primary-btn"
        >
          Print
        </button>

        <button
          id="confirmSend"
          class="send-btn"
        >
          Send
        </button>

      </div>

    </div>

  </div>

  <!-- PRINT AREA -->
  <div id="printInvoice"></div>

  <!-- FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCthUdAwAP0h67p3MfkanelAPdPzZMmPRo",
      authDomain: "billing-app-73ac8.firebaseapp.com",
      projectId: "billing-app-73ac8",
      storageBucket: "billing-app-73ac8.firebasestorage.app",
      messagingSenderId: "637437936055",
      appId: "1:637437936055:web:f83da0ab2d3e994e96e832"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;
  </script>

  <script type="module" src="script.js"></script>

</body>
</html>
